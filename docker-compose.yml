services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      HOSTNAME: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    ports:
      - "3000:3000"
    command: npm run dev -- --hostname 0.0.0.0 --webpack

volumes:
  node_modules:
  next_cache:
